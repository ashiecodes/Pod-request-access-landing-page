<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Pod request access landing page</title>
</head>
<body>
  <div class="grid-container">
    <img class="logo" src="assets/desktop/logo.svg" alt="logo">
    
    <section class="hero">
      <h1>Publish your podcasts <span>everywhere.</span></h1>
      
      <div class="hero-text">
        Upload your audio to Pod with a single click. We’ll then distribute your podcast to Spotify,
        Apple Podcasts, Google Podcasts, Pocket Casts and more!
      </div>
      <div class="brand-strip"><img src="assets/desktop/spotify.svg" alt="spotify log"><img src="assets/desktop/apple-podcast.svg" alt="apple logo"><img src="assets/desktop/google-podcasts.svg" alt="google logo"><img src="assets/desktop/pocket-casts.svg" alt="pocket logo"></div>
      
      <form action="">
        <!-- <div class="wrapper"> -->
          <input type="text" placeholder="Email address">
          <button>Request access</button>
        <!-- </div> -->
      </form>

    </section>

  </div>

</body>
</html>
